<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANDROID A-01 · 3D Robot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #00d4ff;
      --accent-dim: #0a8fb3;
      --bg-0: #05080d;
      --bg-1: #0c1219;
      --bg-2: #141c27;
      --line: rgba(0, 212, 255, 0.25);
      --text: #d8e6f0;
      --text-dim: #6a7d8e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--text);
      font-family: 'Rajdhani', 'PingFang SC', sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #scene-canvas {
      position: absolute;
      inset: 0;
      display: block;
    }

    /* HUD 顶部 */
    .hud-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 22px 30px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .brand {
      font-family: 'Orbitron', sans-serif;
      pointer-events: auto;
    }

    .brand h1 {
      font-size: 22px;
      letter-spacing: 4px;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand h1::after {
      content: '////';
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
    }

    .brand .sub {
      margin-top: 4px;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
    }

    .specs {
      pointer-events: auto;
      background: linear-gradient(145deg, rgba(20, 28, 39, 0.85), rgba(12, 18, 25, 0.7));
      border: 1px solid var(--line);
      padding: 14px 18px;
      font-size: 12px;
      min-width: 220px;
      backdrop-filter: blur(8px);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
    }

    .specs .row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      letter-spacing: 1px;
    }

    .specs .row span:first-child {
      color: var(--text-dim);
    }

    .specs .row span:last-child {
      color: var(--accent);
      font-weight: 600;
    }

    /* 左下角动画面板 */
    .anim-panel {
      position: absolute;
      left: 30px;
      bottom: 30px;
      z-index: 10;
      background: linear-gradient(145deg, rgba(20, 28, 39, 0.9), rgba(12, 18, 25, 0.75));
      border: 1px solid var(--line);
      padding: 18px 22px;
      backdrop-filter: blur(10px);
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      min-width: 260px;
    }

    .anim-panel h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .anim-panel h2::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      border-radius: 50%;
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .anim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .anim-btn {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .anim-btn:hover {
      background: rgba(0, 212, 255, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .anim-btn.active {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 212, 255, 0.1));
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.4), inset 0 0 12px rgba(0, 212, 255, 0.1);
    }

    .anim-btn .key {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0;
    }

    /* 右下角状态 */
    .status-panel {
      position: absolute;
      right: 30px;
      bottom: 30px;
      z-index: 10;
      background: linear-gradient(145deg, rgba(20, 28, 39, 0.9), rgba(12, 18, 25, 0.75));
      border: 1px solid var(--line);
      padding: 16px 20px;
      backdrop-filter: blur(10px);
      clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
      font-size: 12px;
      min-width: 200px;
    }

    .status-panel .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .status-panel .current {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 2px;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
      margin-bottom: 10px;
    }

    .status-panel .hint {
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .status-panel .hint kbd {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--line);
      padding: 1px 5px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: var(--accent);
      margin: 0 2px;
    }

    /* 角落装饰 */
    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      pointer-events: none;
      z-index: 5;
    }

    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .corner.tl { top: 12px; left: 12px; }
    .corner.tr { top: 12px; right: 12px; }
    .corner.bl { bottom: 12px; left: 12px; }
    .corner.br { bottom: 12px; right: 12px; }

    .corner.tl::before { top: 0; left: 0; width: 20px; height: 1px; }
    .corner.tl::after  { top: 0; left: 0; width: 1px; height: 20px; }

    .corner.tr::before { top: 0; right: 0; width: 20px; height: 1px; }
    .corner.tr::after  { top: 0; right: 0; width: 1px; height: 20px; }

    .corner.bl::before { bottom: 0; left: 0; width: 20px; height: 1px; }
    .corner.bl::after  { bottom: 0; left: 0; width: 1px; height: 20px; }

    .corner.br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
    .corner.br::after  { bottom: 0; right: 0; width: 1px; height: 20px; }

    /* Loader */
    .loader {
      position: absolute;
      inset: 0;
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-text {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 6px;
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 20px;
      text-shadow: 0 0 12px var(--accent);
    }

    .loader-bar {
      width: 240px;
      height: 3px;
      background: var(--bg-2);
      overflow: hidden;
      position: relative;
    }

    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: load 1.4s infinite;
    }

    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    @media (max-width: 720px) {
      .anim-panel, .status-panel {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: auto;
        min-width: 0;
      }
      .anim-panel { bottom: 100px; }
      .status-panel { bottom: 12px; }
      .specs { display: none; }
      .hud-top { padding: 16px; }
      .brand h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="hud-top">
      <div class="brand">
        <h1>ANDROID A-01</h1>
        <div class="sub">THREE.JS · KINETIC SIMULATION</div>
      </div>
      <div class="specs">
        <div class="row"><span>MODEL</span><span>A-01</span></div>
        <div class="row"><span>HEIGHT</span><span>1750 mm</span></div>
        <div class="row"><span>WEIGHT</span><span>65 kg</span></div>
        <div class="row"><span>MATERIAL</span><span>ALLOY / COMP</span></div>
        <div class="row"><span>STATUS</span><span>ONLINE</span></div>
      </div>
    </div>

    <div class="anim-panel">
      <h2>MOTION LIBRARY</h2>
      <div class="anim-grid" id="anim-grid"></div>
    </div>

    <div class="status-panel">
      <div class="title">CURRENT ACTION</div>
      <div class="current" id="current-action">IDLE</div>
      <div class="hint">
        拖动 = 旋转<br>
        滚轮 = 缩放<br>
        <kbd>1</kbd>~<kbd>9</kbd> 切换动作
      </div>
    </div>

    <div class="loader" id="loader">
      <div class="loader-text">INITIALIZING A-01</div>
      <div class="loader-bar"></div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
